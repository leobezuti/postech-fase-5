  #         sarif_file: trivy-fs-results.sarif
  #         category: trivy-fs-ngo-service

  build-scan-push:
    name: Build, Scan and Push
    runs-on: ubuntu-latest
  #  needs: [config, sonarcloud, trivy-fs]
    needs: config
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
            -t ${{ env.ECR_REPOSITORY }}:latest \
            ngo-service

      # - name: Run Trivy image scan
      #   if: needs.config.outputs.skip_security_gates != 'true'
      #   uses: aquasecurity/trivy-action@v0.36.0
      #   with:
      #     scan-type: image
      #     image-ref: ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
      #     scanners: vuln
      #     severity: CRITICAL,HIGH
      #     format: table
      #     output: trivy-image-results.txt
      #     exit-code: 1

      # - name: Upload Trivy image scan report
      #   uses: actions/upload-artifact@v4
      #   if: always() && needs.config.outputs.skip_security_gates != 'true'
      #   with:
      #     name: trivy-image-report-${{ env.SERVICE_NAME }}
      #     path: trivy-image-results.txt
      #     retention-days: 14

      - name: Push image to ECR
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker tag ${{ env.ECR_REPOSITORY }}:latest \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  update-manifest:
    name: Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: build-scan-push
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.REPO_TOKEN }}
          path: gitops

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS account ID
        id: aws
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Update image tag in kustomization
        working-directory: gitops/ngo-service
        run: |
          kustomize edit set image ${{ env.IMAGE_ALIAS }}=${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Commit and push to GitOps repo
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ngo-service/kustomization.yaml
          git diff --staged --quiet || git commit -m "chore(deploy): ngo-service ${{ github.sha }}"
          git push
