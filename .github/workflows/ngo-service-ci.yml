name: NGO Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - "ngo-service/**"
      - ".github/workflows/ngo-service-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "ngo-service/**"
      - ".github/workflows/ngo-service-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

env:
  AWS_REGION: us-east-1
  SERVICE_NAME: ngo-service
  IMAGE_ALIAS: ngo-service-image
  ECR_REPOSITORY: ngo-service
  GITOPS_REPO: diego-silva1016/postech-fase-5-gitops
  SKIP_SECURITY_GATES: "true" # set to "false" to re-enable Sonar and Trivy

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      skip_security_gates: ${{ steps.export.outputs.skip_security_gates }}
    steps:
      - id: export
        run: echo "skip_security_gates=${SKIP_SECURITY_GATES}" >> "$GITHUB_OUTPUT"

