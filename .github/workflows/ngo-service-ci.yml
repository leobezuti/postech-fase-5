name: NGO Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - "ngo-service/**"
      - ".github/workflows/ngo-service-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "ngo-service/**"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

env:
  AWS_REGION: us-east-1
  SERVICE_NAME: ngo-service
  IMAGE_ALIAS: ngo-service-image
  ECR_REPOSITORY: ngo-service
  GITOPS_REPO: leobezuti/postech-fase-5-gitops
  SKIP_SECURITY_GATES: "false" # DevSecOps ligado: SAST (Semgrep) + SCA/secret/IaC (Trivy)

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      skip_security_gates: ${{ steps.export.outputs.skip_security_gates }}
    steps:
      - id: export
        run: echo "skip_security_gates=${SKIP_SECURITY_GATES}" >> "$GITHUB_OUTPUT"

  # ---------------- SAST: analise estatica de codigo ----------------
  sast:
    name: SAST (Semgrep)
    needs: config
    if: needs.config.outputs.skip_security_gates != 'true'
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep scan --config auto --sarif --output semgrep.sarif ngo-service || true
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif
          category: sast-ngo-service

  # ---------------- SCA / Secret / IaC ----------------
  sca:
    name: SCA (Trivy Filesystem)
    needs: config
    if: needs.config.outputs.skip_security_gates != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: ngo-service
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-fs.sarif
          category: sca-ngo-service

  build-scan-push:
    name: Build, Scan and Push
    runs-on: ubuntu-latest
    needs: [config, sast, sca]
    if: always() && needs.config.result == 'success' && (needs.sast.result == 'success' || needs.sast.result == 'skipped') && (needs.sca.result == 'success' || needs.sca.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build Docker image
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }}:${{ github.sha }} -t ${{ env.ECR_REPOSITORY }}:latest ngo-service
      - name: Trivy image scan (relatorio)
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          scan-type: image
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          scanners: vuln
          severity: CRITICAL,HIGH
          format: table
          output: trivy-image.txt
          exit-code: "0"
      - name: Upload image scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-report-${{ env.SERVICE_NAME }}
          path: trivy-image.txt
          retention-days: 14
      - name: Push image to ECR
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker tag ${{ env.ECR_REPOSITORY }}:latest ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  update-manifest:
    name: Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: build-scan-push
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.REPO_TOKEN }}
          path: gitops
      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Get AWS account ID
        id: aws
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT
      - name: Update image tag in kustomization
        working-directory: gitops/ngo-service
        run: |
          kustomize edit set image ${{ env.IMAGE_ALIAS }}=${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
      - name: Commit and push to GitOps repo
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ngo-service/kustomization.yaml
          git diff --staged --quiet || git commit -m "chore(deploy): ngo-service ${{ github.sha }}"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && break || sleep $((RANDOM % 4 + 2))
          done
